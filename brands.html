<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Brands</title>

<!-- REMIX ICON -->
<link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
rel="stylesheet">

<style>

/* BASIC */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f1f3f6;
}

/* PAGE */
.brand-page{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    background:#fff;
}

/* HEADER */
.brand-header{
    height:56px;
    background:#fff;

    display:flex;
    align-items:center;

    padding:0 14px;

    border-bottom:1px solid #e5e5e5;

    position:sticky;
    top:0;
    z-index:100;
}

/* BACK */
.back-btn{
    font-size:23px;
    color:#222;
    cursor:pointer;
}

/* TITLE */
.brand-title{
    flex:1;
    text-align:center;

    font-size:16px;
    font-weight:600;
    color:#222;

    margin-right:23px;
}

/* SEARCH BOX */
.search-box{
    padding:12px;
    background:#fff;
    border-bottom:1px solid #eee;
}

.search-box input{
    width:100%;
    height:42px;

    border:none;
    outline:none;

    background:#f1f3f6;

    border-radius:10px;

    padding:0 14px;

    font-size:14px;
}

/* BRAND LIST */
.brand-list{
    padding:6px 0;
}

/* BRAND ITEM */
.brand-item{
    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:15px 14px;

    border-bottom:1px solid #f1f1f1;

    cursor:pointer;
}

.brand-item:hover{
    background:#fafafa;
}

/* BRAND NAME */
.brand-name{
    font-size:14px;
    color:#222;
}

/* ARROW */
.brand-item i{
    font-size:18px;
    color:#999;
}

/* MOBILE */
@media(max-width:480px){

    .brand-page{
        max-width:100%;
    }

    .brand-item{
        padding:14px 12px;
    }

}

</style>
</head>

<body>

<div class="brand-page">

    <!-- HEADER -->
    <div class="brand-header">

        <!-- BACK -->
        <i class="ri-arrow-left-line back-btn"></i>

        <!-- TITLE -->
        <div class="brand-title">
            Search By Brand
        </div>

    </div>

    <!-- SEARCH -->
    <div class="search-box">

        <input
            type="text"
            id="brandSearch"
            placeholder="Search Brand"
        >

    </div>

    <!-- BRAND LIST -->
    <div class="brand-list" id="brandList"></div>

</div>

<script>

/* =========================
   BACK BUTTON
========================= */

document.querySelector(".back-btn")
.addEventListener("click", function(){

    if(window.history.length > 1){
        history.back();
    }else{
        window.location.href = "index.html";
    }

});


/* =========================
   BRAND DATA
========================= */

const brands = [

    "Nike",
    "Adidas",
    "Puma",
    "Zara",
    "H&M",
    "Levi's",
    "Roadster",
    "Allen Solly",
    "Louis Philippe",
    "Van Heusen",
    "Samsung",
    "Apple",
    "OnePlus",
    "Realme",
    "Boat",
    "Sony",
    "HP",
    "Dell",
    "ASUS",
    "Lenovo",
    "Wildcraft",
    "Titan",
    "Fastrack",
    "Woodland",
    "Bata"

];


/* =========================
   RENDER FUNCTION
========================= */

const brandList =
document.getElementById("brandList");

function renderBrands(list){

    brandList.innerHTML = "";

    list.forEach((brand)=>{

        const item =
        document.createElement("div");

        item.className = "brand-item";

        item.innerHTML = `
            <span class="brand-name">
                ${brand}
            </span>

            <i class="ri-arrow-right-s-line"></i>
        `;

        /* OPEN BRAND PRODUCTS */
        item.addEventListener("click", function(){

            window.location.href =
            "products.html?brand=" +
            encodeURIComponent(brand);

        });

        brandList.appendChild(item);

    });

}


/* =========================
   SEARCH FILTER
========================= */

document.getElementById("brandSearch")
.addEventListener("input", function(){

    const value =
    this.value.toLowerCase();

    const filtered =
    brands.filter((brand)=>
        brand.toLowerCase().includes(value)
    );

    renderBrands(filtered);

});


/* =========================
   INITIAL LOAD
========================= */

renderBrands(brands);

</script>

</body>
</html>
