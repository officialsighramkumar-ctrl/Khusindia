<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cart</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f1f3f6;
}

/* PAGE */
.cart-page{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    padding-bottom:110px;
}

/* HEADER */
.header{
    height:55px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    position:sticky;
    top:0;
    z-index:10;
    border-bottom:1px solid #eee;
}

.back-btn{
    position:absolute;
    left:15px;
    font-size:20px;
    cursor:pointer;
    color:#333;
}

.header-title{
    font-size:16px;
    font-weight:600;
}

.header-right{
    position:absolute;
    right:15px;
    display:flex;
    gap:15px;
    font-size:18px;
    color:#444;
}

.header-right i{
    cursor:pointer;
}

/* CART CARD */
.cart-card{
    background:#fff;
    margin:10px;
    padding:12px;
    border-radius:12px;
    display:flex;
    gap:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.cart-image{
    width:85px;
    height:95px;
    border-radius:10px;
    overflow:hidden;
}

.cart-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.cart-info{
    flex:1;
}

.cart-name{
    font-size:14px;
    font-weight:600;
}

.cart-price{
    margin-top:5px;
    font-size:15px;
    font-weight:700;
}

.qty-box{
    margin-top:10px;
    display:flex;
    align-items:center;
    gap:10px;
}

.qty-btn{
    width:28px;
    height:28px;
    border:none;
    border-radius:50%;
    background:#eee;
    cursor:pointer;
}

/* PRICE BOX */
.price-box{
    background:#fff;
    margin:10px;
    padding:14px;
    border-radius:12px;
}

.price-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
    font-size:13px;
}

.total{
    border-top:1px solid #eee;
    padding-top:10px;
    font-weight:700;
    font-size:15px;
}

/* FOOTER */
.checkout-bar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    max-width:420px;
    background:#fff;
    padding:10px 14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-top:1px solid #eee;
}

.checkout-btn{
    background:#2874f0;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

</style>
</head>

<body>

<div class="cart-page">

    <!-- HEADER -->
<div class="header">

    <i class="fa-solid fa-arrow-left back-btn"></i>

    <div class="header-title">My Cart</div>

    <div class="header-right">

        <i class="fa-solid fa-magnifying-glass"></i>

    </div>

</div>

    <!-- CART ITEMS -->
    <div id="cartItems"></div>

    <!-- PRICE -->
    <div class="price-box">

        <div class="price-row">
            <span>Items</span>
            <span id="items">0</span>
        </div>

        <div class="price-row">
            <span>Total</span>
            <span id="total">₹0</span>
        </div>

        <div class="price-row">
            <span>Discount</span>
            <span id="discount" style="color:green;">₹0</span>
        </div>

        <div class="price-row total">
            <span>Final</span>
            <span id="final">₹0</span>
        </div>

    </div>

</div>

<!-- FOOTER -->
<div class="checkout-bar">

    <div>
        <h3 id="finalBottom">₹0</h3>
        <small>Free Delivery</small>
    </div>

    <button class="checkout-btn" id="placeOrderBtn">
        Place Order
    </button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* BACK */
document.querySelector(".back-btn").onclick = function(){
    history.length > 1 ? history.back() : window.location.href="index.html";
};

/* SEARCH */
document.querySelector(".fa-magnifying-glass").onclick = function(){
    window.location.href = "search.html";
};


/* RENDER */
function render(){

    const box = document.getElementById("cartItems");
    box.innerHTML = "";

    if(cart.length === 0){
        box.innerHTML = "<p style='padding:15px;color:#777;'>Cart is empty</p>";
        update();
        return;
    }

    cart.forEach((item,i)=>{

        box.innerHTML += `
        <div class="cart-card">

            <div class="cart-image">
                <img src="${item.image}">
            </div>

            <div class="cart-info">

                <div class="cart-name">${item.name}</div>
                <div class="cart-price">₹${item.price}</div>

                <div class="qty-box">
                    <button class="qty-btn" onclick="dec(${i})">-</button>
                    <span>${item.qty}</span>
                    <button class="qty-btn" onclick="inc(${i})">+</button>
                </div>

            </div>

        </div>`;
    });

    update();
}

/* QTY */
function inc(i){
    cart[i].qty++;
    save();
}

function dec(i){
    if(cart[i].qty>1) cart[i].qty--;
    else cart.splice(i,1);
    save();
}

/* SAVE */
function save(){
    localStorage.setItem("cart",JSON.stringify(cart));
    render();
}

/* PRICE */
function update(){

    let t=0,q=0;

    cart.forEach(i=>{
        t += i.price*i.qty;
        q += i.qty;
    });

    let d = Math.floor(t*0.2);
    let f = t-d;

    document.getElementById("items").innerText=q;
    document.getElementById("total").innerText="₹"+t;
    document.getElementById("discount").innerText="-₹"+d;
    document.getElementById("final").innerText="₹"+f;
    document.getElementById("finalBottom").innerText="₹"+f;
}

/* PLACE ORDER */
document.getElementById("placeOrderBtn").onclick = function(){

    if(cart.length===0){
        alert("Cart Empty");
        return;
    }

    localStorage.setItem("checkoutCart",JSON.stringify(cart));

    window.location.href="checkout.html";
};

/* INIT */
render();

</script>

</body>
</html>
