<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Details</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f4f5f7;
}

/* HEADER */
.header{
    height:52px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    position:sticky;
    top:0;
    border-bottom:1px solid #eee;
}

.back-btn{
    position:absolute;
    left:14px;
    font-size:20px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    padding:12px;
}

/* BOX */
.box{
    background:#fff;
    padding:14px;
    border-radius:14px;
    margin-bottom:12px;
}

/* TITLE */
.title{
    font-size:13px;
    font-weight:600;
    margin-bottom:10px;
}

/* CARD ITEM */
.item{
    padding:10px;
    border:1px solid #eee;
    border-radius:10px;
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    font-size:13px;
}

/* BUTTON */
.btn{
    margin-top:10px;
    padding:10px;
    border:none;
    background:#111;
    color:#fff;
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin-top:8px;
    border:1px solid #ddd;
    border-radius:8px;
}

/* REMOVE */
.remove{
    color:red;
    cursor:pointer;
    margin-left:10px;
}

/* COLLAPSE */
.hidden{ display:none; }

</style>
</head>

<body>

<div class="header">
    <i class="fa-solid fa-arrow-left back-btn"></i>
    <div>Bank Details</div>
</div>

<div class="container">

<!-- ================= SAVED CARDS ================= -->
<div class="box">

    <div class="title">Saved Cards</div>

    <div id="cardList"></div>

    <button class="btn" onclick="toggleCardForm()">
        + Add Card
    </button>

    <!-- FORM -->
    <div id="cardForm" class="hidden">

        <input id="cardNumber" placeholder="Card Number">
        <input id="cardName" placeholder="Card Holder Name">
        <input id="cardExpiry" placeholder="Expiry (MM/YY)">

        <button class="btn" onclick="saveCard()">Save Card</button>

    </div>

</div>

<!-- ================= BANK DETAILS ================= -->
<div class="box">

    <div class="title">Bank Details</div>

    <input id="bankName" placeholder="Bank Name">
    <input id="accNumber" placeholder="Account Number">
    <input id="ifsc" placeholder="IFSC Code">

    <button class="btn" onclick="saveBank()">Save Bank</button>

</div>

</div>

<script>

/* BACK */
document.querySelector(".back-btn").onclick = () => history.back();


/* =========================
   INIT
========================= */
window.onload = function(){
    renderCards();
    loadBank();
};


/* =========================
   TOGGLE CARD FORM
========================= */
function toggleCardForm(){
    document.getElementById("cardForm").classList.toggle("hidden");
}


/* =========================
   SAVE CARD
========================= */
function saveCard(){

    let number = document.getElementById("cardNumber").value;
    let name = document.getElementById("cardName").value;
    let expiry = document.getElementById("cardExpiry").value;

    if(!number || !name) return alert("Fill card details");

    let cards = JSON.parse(localStorage.getItem("cards")) || [];

    cards.push({number,name,expiry});

    localStorage.setItem("cards", JSON.stringify(cards));

    document.getElementById("cardNumber").value = "";
    document.getElementById("cardName").value = "";
    document.getElementById("cardExpiry").value = "";

    renderCards();
}


/* =========================
   RENDER CARDS
========================= */
function renderCards(){

    let list = document.getElementById("cardList");
    let cards = JSON.parse(localStorage.getItem("cards")) || [];

    list.innerHTML = "";

    if(cards.length === 0){
        list.innerHTML = "<p style='color:#777;font-size:13px'>No saved cards</p>";
        return;
    }

    cards.forEach((c,i)=>{

        list.innerHTML += `
        <div class="item">
            <div>
                💳 **** ${c.number.slice(-4)} <br>
                <small>${c.name}</small>
            </div>

            <div>
                <small>${c.expiry || ""}</small>
                <span class="remove" onclick="deleteCard(${i})">✖</span>
            </div>
        </div>
        `;
    });

}


/* =========================
   DELETE CARD
========================= */
function deleteCard(index){

    let cards = JSON.parse(localStorage.getItem("cards")) || [];

    cards.splice(index,1);

    localStorage.setItem("cards", JSON.stringify(cards));

    renderCards();

}


/* =========================
   SAVE BANK
========================= */
function saveBank(){

    let bank = {
        name: document.getElementById("bankName").value,
        acc: document.getElementById("accNumber").value,
        ifsc: document.getElementById("ifsc").value
    };

    if(!bank.name || !bank.acc) return alert("Fill bank details");

    localStorage.setItem("bank", JSON.stringify(bank));

    alert("Bank Saved");

}


/* =========================
   LOAD BANK (AUTO PREFILL)
========================= */
function loadBank(){

    let bank = JSON.parse(localStorage.getItem("bank"));

    if(bank){
        document.getElementById("bankName").value = bank.name || "";
        document.getElementById("accNumber").value = bank.acc || "";
        document.getElementById("ifsc").value = bank.ifsc || "";
    }

}

</script>

</body>
</html>
