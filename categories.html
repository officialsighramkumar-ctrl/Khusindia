<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<style>

/* BASIC */
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f1f3f6;
}

.app{
    max-width:420px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#fff;
}

/* HEADER */
.header{
    height:54px;
    background:#fff;
    border-bottom:1px solid #e5e5e5;

    display:flex;
    align-items:center;
    justify-content:center;

    position:relative;
    padding:0 14px;
}

/* BACK ICON */
.back-btn{
    position:absolute;
    left:14px;

    font-size:20px;
    color:#444;
    cursor:pointer;
}

/* TITLE */
.header-title{
    margin:0;

    font-size:15px;
    font-weight:600;
    color:#222;

    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

/* RIGHT ICONS */
.header-right{
    position:absolute;
    right:14px;

    display:flex;
    align-items:center;
    gap:18px;
}

.header-right i{
    font-size:18px;
    color:#555;
    cursor:pointer;
}

/* MAIN */
.container{
    display:flex;
    flex:1;
    overflow:hidden;
}

/* LEFT PANEL */
.left{
    width:90px;
    background:#fff;
    border-right:1px solid #eee;
    overflow-y:auto;
}

.left::-webkit-scrollbar{
    display:none;
}

/* LEFT TAB */
.tab{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;

    padding:12px 5px;
    border-bottom:1px solid #eee;

    font-size:11px;
    cursor:pointer;
    text-align:center;
}

.tab.active{
    background:#eef4ff;
    color:#2874f0;
    font-weight:bold;
}

/* LEFT IMAGE */
.left-circle{
    width:45px;
    height:45px;
    border-radius:50%;
    overflow:hidden;
    margin-bottom:5px;
}

.left-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* RIGHT PANEL */
.right{
    flex:1;
    padding:10px 8px;
    overflow-y:auto;
    background:#fff;
}

.right::-webkit-scrollbar{
    display:none;
}

/* TITLE */
.title{
    font-size:15px;
    font-weight:700;
    margin-bottom:10px;
    color:#111;
}

/* SECTION */
.section-title{
    font-size:13px;
    font-weight:700;
    margin:12px 0 8px;
    color:#111;
}

/* ROW */
.row{
    display:flex;
    overflow-x:auto;
    gap:12px;
    padding-bottom:8px;
}

.row::-webkit-scrollbar{
    display:none;
}

/* CARD */
.card{
    flex:0 0 auto;
    width:72px;
    text-align:center;
}

/* IMAGE */
.right-circle{
    width:62px;
    height:62px;
    border-radius:50%;
    overflow:hidden;
    background:#ddd;
    margin:auto;
}

.right-circle img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* TEXT */
.card p{
    font-size:11px;
    margin-top:5px;
    color:#222;
    line-height:1.3;
}

</style>
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">

        <!-- BACK -->
        <i class="fa-solid fa-arrow-left back-btn"></i>

        <!-- TITLE -->
        <p class="header-title">All Categories</p>

        <!-- RIGHT -->
        <div class="header-right">
            <i class="fa-solid fa-magnifying-glass"></i>
            <i class="fa-solid fa-bag-shopping"></i>
        </div>

    </div>

    <div class="container">

        <!-- LEFT -->
        <div class="left" id="leftMenu"></div>

        <!-- RIGHT -->
        <div class="right">

            <div class="title" id="categoryTitle">FOR YOU</div>

            <div id="productGrid"></div>

        </div>

    </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    // BACK BUTTON
    document.querySelector(".back-btn")
.addEventListener("click", function () {

    if (history.length > 1) {
        history.back();
    } else {
        window.location.href = "index.html";
    }

});
    // SEARCH CLICK
document.querySelector(".fa-magnifying-glass")
.addEventListener("click", function () {

    window.location.href = "search.html";

});

    // BAG CLICK
    document.querySelector(".fa-bag-shopping")
    .addEventListener("click", function () {
        alert("Bag Clicked");
    });

    // RIGHT SIDE DATA
    const data = {

        foryou: {
            "Trending": [
                {name:"Top Deals", img:"images/deal.jpg"},
                {name:"Best Picks", img:"images/best.jpg"},
                {name:"New Arrivals", img:"images/new.jpg"}
            ]
        },

        fashion: {
            "Men": [
                {name:"Casual", img:"images/casual.jpg"},
                {name:"Formal", img:"images/formal.jpg"},
                {name:"Sports", img:"images/sports.jpg"}
            ],
            "Women": [
                {name:"Ethnic", img:"images/ethnic.jpg"},
                {name:"Western", img:"images/western.jpg"}
            ]
        },

        electronics: {
            "Mobiles": [
                {name:"iPhone", img:"images/iphone.jpg"},
                {name:"Android", img:"images/android.jpg"}
            ],
            "Appliances": [
                {name:"TV", img:"images/tv.jpg"},
                {name:"Fridge", img:"images/fridge.jpg"}
            ]
        },

        dryfruits: {
            "Nuts": [
                {name:"Almonds", img:"images/almonds.jpg"},
                {name:"Cashews", img:"images/cashews.jpg"}
            ],
            "Dried Fruits": [
                {name:"Raisins", img:"images/raisins.jpg"},
                {name:"Dates", img:"images/dates.jpg"}
            ]
        }
    };

    // LEFT MENU
    const categories = [
        {name:"For You", key:"foryou", img:"images/foryou.jpg"},
        {name:"Fashion", key:"fashion", img:"images/fashion.jpg"},
        {name:"Electronics", key:"electronics", img:"images/electronics.jpg"},
        {name:"Dry Fruits", key:"dryfruits", img:"images/dryfruits.jpg"}
    ];

    const left = document.getElementById("leftMenu");
    const grid = document.getElementById("productGrid");
    const title = document.getElementById("categoryTitle");

    // RIGHT RENDER
    function renderItems(category){

        if(!data[category]) return;

        grid.innerHTML = "";

        for(let section in data[category]){

            grid.innerHTML += `
                <div class="section-title">${section}</div>
            `;

            let row = `<div class="row">`;

            data[category][section].forEach(item => {

                row += `
                    <div class="card">

                        <div class="right-circle">
                            <img src="${item.img}">
                        </div>

                        <p>${item.name}</p>

                    </div>
                `;
            });

            row += `</div>`;

            grid.innerHTML += row;
        }

        title.innerText = category.toUpperCase();
    }

    // LEFT MENU
    function renderLeftMenu(){

        left.innerHTML = "";

        categories.forEach((cat,index)=>{

            const tab = document.createElement("div");

            tab.className =
                "tab" + (index===0 ? " active" : "");

            tab.innerHTML = `
                <div class="left-circle">
                    <img src="${cat.img}">
                </div>

                <span>${cat.name}</span>
            `;

            tab.onclick = function(){

                document.querySelectorAll(".left .tab")
                .forEach(t => t.classList.remove("active"));

                tab.classList.add("active");

                renderItems(cat.key);
            };

            left.appendChild(tab);

        });
    }

    // INITIAL LOAD
    renderLeftMenu();
    renderItems("foryou");


});

</script>

</body>
</html>
