<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BASIC */
body {
    margin: 0;
    font-family: Arial;
    background: #f1f3f6;
}

.app {
    max-width: 420px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    background: #fff;
    border-bottom: 1px solid #ddd;
}

/* MAIN */
.container {
    display: flex;
    flex: 1;
}

/* LEFT PANEL */
.left {
    width: 90px;
    background: #fff;
    border-right: 1px solid #eee;
    overflow-y: auto;
}

.tab {
    text-align: center;
    padding: 12px 5px;
    font-size: 11px;
    cursor: pointer;
}

.tab.active {
    background: #eef4ff;
    color: #2874f0;
    font-weight: bold;
}


.tab {
    display: flex;
    flex-direction: column;
    align-items: center;   /* 🔥 main fix */
    justify-content: center;

    padding: 12px 5px;
    border-bottom: 1px solid #eee;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
}

.left-circle {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    overflow: hidden;

    margin: 0 auto 5px;   /* 🔥 center fix */
}

.left-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* RIGHT PANEL */
.right {
    flex: 1;
    padding: 8px;
    overflow-y: auto;
}

.title {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
}

/* SECTION */
.section-title {
    font-size: 13px;
    font-weight: bold;
    margin: 10px 0 6px;
}

/* 🔥 HORIZONTAL ROW */
.row {
    display: flex;
    overflow-x: auto;
    gap: 12px;
    padding-bottom: 6px;
}

.row::-webkit-scrollbar {
    display: none;
}

/* CARD */
.card {
    flex: 0 0 auto;
    width: 70px;
    text-align: center;
}

/* IMAGE FRAME */
.right-circle {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    overflow: hidden;
    background: #ddd;
    margin: 0 auto;
}

/* IMAGE */
.right-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXT */
.card p {
    font-size: 11px;
    margin-top: 4px;
}

</style>
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="header">
        <span onclick="history.back()">←</span>
        <p>All Categories</p>
        <span>⋮</span>
    </div>

    <div class="container">

    <!-- LEFT -->
    <div class="left" id="leftMenu"></div>

    <!-- RIGHT -->
    <div class="right">

        <div class="title" id="categoryTitle">For You</div>
        <div id="productGrid"></div>

    </div>

</div>
    

<script>
document.addEventListener("DOMContentLoaded", function () {

    // 🔥 RIGHT SIDE DATA
    const data = {

        foryou: {
            "Trending": [
                {name:"Top Deals", img:"images/deal.jpg"},
                {name:"Best Picks", img:"images/best.jpg"},
                {name:"New Arrivals", img:"images/new.jpg"}
            ]
        },

        fashion: {
            "Men": [
                {name:"Casual", img:"images/casual.jpg"},
                {name:"Formal", img:"images/formal.jpg"},
                {name:"Sports", img:"images/sports.jpg"}
            ],
            "Women": [
                {name:"Ethnic", img:"images/ethnic.jpg"},
                {name:"Western", img:"images/western.jpg"}
            ]
        },

        electronics: {
            "Mobiles": [
                {name:"iPhone", img:"images/iphone.jpg"},
                {name:"Android", img:"images/android.jpg"}
            ],
            "Appliances": [
                {name:"TV", img:"images/tv.jpg"},
                {name:"Fridge", img:"images/fridge.jpg"}
            ]
        },

        dryfruits: {
            "Nuts": [
                {name:"Almonds", img:"images/almonds.jpg"},
                {name:"Cashews", img:"images/cashews.jpg"}
            ],
            "Dried Fruits": [
                {name:"Raisins", img:"images/raisins.jpg"},
                {name:"Dates", img:"images/dates.jpg"}
            ]
        }
    };

    // 🔥 LEFT SIDE DATA
    const categories = [
        {name:"For You", key:"foryou", img:"images/foryou.jpg"},
        {name:"Fashion", key:"fashion", img:"images/fashion.jpg"},
        {name:"Electronics", key:"electronics", img:"images/electronics.jpg"},
        {name:"Dry Fruits", key:"dryfruits", img:"images/dryfruits.jpg"}
    ];

    const left = document.getElementById("leftMenu");
    const grid = document.getElementById("productGrid");
    const title = document.getElementById("categoryTitle");

    // 🔥 RIGHT RENDER
    function renderItems(category) {

        if (!data[category]) return;

        grid.innerHTML = "";

        for (let section in data[category]) {

            grid.innerHTML += `<div class="section-title">${section}</div>`;

            let row = `<div class="row">`;

            data[category][section].forEach(item => {
                row += `
                    <div class="card">
                        <div class="right-circle">
                            <img src="${item.img}">
                        </div>
                        <p>${item.name}</p>
                    </div>
                `;
            });

            row += `</div>`;
            grid.innerHTML += row;
        }

        title.innerText = category.toUpperCase();
    }

    // 🔥 LEFT RENDER
    function renderLeftMenu() {

        left.innerHTML = "";

        categories.forEach((cat, index) => {

            const tab = document.createElement("div");
            tab.className = "tab" + (index === 0 ? " active" : "");

            tab.innerHTML = `
                <div class="left-circle">
                    <img src="${cat.img}">
                </div>
                <span>${cat.name}</span>
            `;

            tab.onclick = function () {

                document.querySelectorAll(".left .tab")
                    .forEach(t => t.classList.remove("active"));

                tab.classList.add("active");

                renderItems(cat.key);
            };

            left.appendChild(tab);
        });
    }

    // 🔥 INITIAL LOAD
    renderLeftMenu();
    renderItems("foryou");

});
</script>

</body>
</html>
