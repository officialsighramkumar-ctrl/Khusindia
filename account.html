<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f4f5f7;
}

/* HEADER */
.header{
    background:#fff;
    padding:18px;
    border-bottom:1px solid #eee;
}

.user-box{
    font-size:18px;
    font-weight:600;
}

.sub{
    font-size:12px;
    color:#777;
    margin-top:4px;
}

.btn{
    margin-top:10px;
    padding:10px;
    border:none;
    background:#111;
    color:#fff;
    border-radius:10px;
    cursor:pointer;
    width:100%;
}

/* MENU */
.menu{
    margin:12px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
}

/* ITEM */
.item{
    padding:14px;
    border-bottom:1px solid #eee;
    font-size:14px;
    display:flex;
    justify-content:space-between;
    cursor:pointer;
}

.logout{
    color:red;
    font-weight:600;
}

/* HIDE */
.hidden{
    display:none;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

    <div id="userBox" class="user-box">Hello User 👋</div>
    <div class="sub">Manage your account</div>

    <button id="authBtn" class="btn">Sign In</button>

</div>

<!-- MENU -->
<div id="menuBox" class="menu">

    <!-- LOGIN ONLY -->
    <div id="secureSection">

        <div class="item" onclick="go('edit-address.html')">
            Edit Profile <i class="fa-solid fa-angle-right"></i>
        </div>

        <div class="item" onclick="go('bank.html')">
            Bank Details <i class="fa-solid fa-angle-right"></i>
        </div>

        <div class="item" onclick="go('address.html')">
            Saved Address <i class="fa-solid fa-angle-right"></i>
        </div>

        <div class="item" onclick="go('wishlist.html')">
            My Wishlist <i class="fa-solid fa-angle-right"></i>
        </div>

    </div>

    <!-- ALWAYS VISIBLE -->
    <div class="item">
        Choose Language
        <i class="fa-solid fa-angle-right"></i>
    </div>

    <div class="item">
        Sell on KhusIndia
        <i class="fa-solid fa-angle-right"></i>
    </div>

    <div class="item">
        Help
        <i class="fa-solid fa-angle-right"></i>
    </div>

    <div class="item">
        Privacy Policy
        <i class="fa-solid fa-angle-right"></i>
    </div>

    <div class="item">
        Terms & Conditions
        <i class="fa-solid fa-angle-right"></i>
    </div>

    <div class="item logout" onclick="logout()">
        Logout
    </div>

</div>
<script>

/* =========================
   FULL DYNAMIC INIT
========================= */

function init(){

    const user = localStorage.getItem("username");

    const userBox = document.getElementById("userBox");
    const authBtn = document.getElementById("authBtn");
    const menuBox = document.getElementById("menuBox");
    const secureSection = document.getElementById("secureSection");

    // =========================
    // GUEST MODE
    // =========================
    if(!user || user.trim() === ""){

        userBox.innerText = "Hello User 👋";

        authBtn.innerText = "Sign In";

        menuBox.classList.add("hidden");

        secureSection.style.display = "none";

        authBtn.onclick = function(){
            window.location.href = "login.html";
        };

    }

    // =========================
    // LOGIN MODE (ANY USER)
    // =========================
    else{

        userBox.innerText = "Hello " + user + " 👋";

        authBtn.innerText = "My Account";

        menuBox.classList.remove("hidden");

        secureSection.style.display = "block";

        authBtn.onclick = function(){
            menuBox.classList.toggle("hidden");
        };

    }
}

init();

/* NAVIGATION */
function go(page){
    window.location.href = page;
}

/* LOGOUT */
function logout(){
    localStorage.removeItem("username");
    location.reload();
}

</script>

</body>
</html>
