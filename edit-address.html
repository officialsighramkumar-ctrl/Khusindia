<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Edit Address</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f1f3f6;
}

.page{
    max-width:420px;
    margin:auto;
    min-height:100vh;
    background:#fff;
}

/* HEADER */
.header{
    height:52px;
    background:#fff;

    display:flex;
    align-items:center;
    justify-content:center;

    border-bottom:1px solid #eee;

    position:sticky;
    top:0;

    padding:0 14px;
}

.back-btn{
    position:absolute;
    left:14px;

    font-size:21px;
    cursor:pointer;
}

.title{
    font-size:15px;
    font-weight:600;
}

/* FORM */
.form{
    padding:14px;
}

.input-box{
    margin-bottom:14px;
}

.input-box label{
    display:block;

    margin-bottom:6px;

    font-size:13px;
    font-weight:600;
}

.input-box input,
.input-box textarea{
    width:100%;

    border:1px solid #ddd;

    border-radius:10px;

    padding:12px;

    outline:none;

    font-size:14px;
}

textarea{
    resize:none;
    height:90px;
}

/* BTN */
.save-btn{
    width:100%;
    height:48px;

    border:none;

    border-radius:10px;

    background:#2874f0;

    color:#fff;

    font-size:14px;
    font-weight:600;

    cursor:pointer;

    margin-top:10px;
}

/* NEW ADDRESS */
.new-address{
    margin-top:18px;

    text-align:center;

    font-size:14px;
    font-weight:600;

    color:#2874f0;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="page">

    <!-- HEADER -->
    <div class="header">

        <i class="fa-solid fa-arrow-left
        back-btn"></i>

        <div class="title">

            Edit Address

        </div>

    </div>

    <!-- FORM -->
    <div class="form">

        <!-- NAME -->
        <div class="input-box">

            <label>Full Name</label>

            <input type="text"
            id="name">

        </div>

        <!-- ADDRESS -->
        <div class="input-box">

            <label>Address</label>

            <textarea
            id="address"></textarea>

        </div>

        <!-- PIN -->
        <div class="input-box">

            <label>PIN Code</label>

            <input type="text"
            id="pin">

        </div>

        <!-- PHONE -->
        <div class="input-box">

            <label>Phone Number</label>

            <input type="text"
            id="phone">

        </div>

        <!-- SAVE -->
        <button class="save-btn"
        id="saveBtn">

            Save Changes

        </button>

        <!-- NEW -->
        <div class="new-address"
        onclick="window.location.href='address.html'">

            + Add New Delivery Address

        </div>

    </div>

</div>

<script>

/* =========================
   BACK BUTTON
========================= */

document.querySelector(".back-btn")
.addEventListener("click", function(){

    if(history.length > 1){
        history.back();
    }else{
        window.location.href =
        "checkout.html";
    }

});


/* =========================
   LOAD SAVED ADDRESS
========================= */

window.onload = function(){

    /* GET DATA */
    const savedName =
    localStorage.getItem("checkoutName");

    const savedAddress =
    localStorage.getItem("checkoutAddress");

    const savedPin =
    localStorage.getItem("checkoutPin");

    const savedPhone =
    localStorage.getItem("checkoutPhone");


    /* FILL INPUTS */
    document.getElementById("name").value =
    savedName || "";

    document.getElementById("address").value =
    savedAddress || "";

    document.getElementById("pin").value =
    savedPin || "";

    document.getElementById("phone").value =
    savedPhone || "";

};


/* =========================
   SAVE CHANGES
========================= */

document.getElementById("saveBtn")
.addEventListener("click", function(){

    /* GET VALUES */
    const newName =
    document.getElementById("name").value;

    const newAddress =
    document.getElementById("address").value;

    const newPin =
    document.getElementById("pin").value;

    const newPhone =
    document.getElementById("phone").value;


    /* SAVE */
    localStorage.setItem(
    "checkoutName",
    newName
    );

    localStorage.setItem(
    "checkoutAddress",
    newAddress
    );

    localStorage.setItem(
    "checkoutPin",
    newPin
    );

    localStorage.setItem(
    "checkoutPhone",
    newPhone
    );


    alert("Address Updated");


    /* REDIRECT */
    window.location.href =
    "checkout.html";

});

</script>
