<!DOCTYPE html>
<html>
<head>
    <title>Search</title>
    <link rel="stylesheet" href="style.css">

    <!-- ICONS -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="search-page">

    <!-- TOP SEARCH BAR (sticky feel) -->
    <div class="search-top">
        <i class="ri-arrow-left-line" onclick="history.back()"></i>

        <input type="text" id="searchInput" placeholder="Search for styles, brands & more">
    </div>

    <!-- HISTORY -->
    <ul id="historyList" class="history"></ul>

</div>

<body>

<div class="search-page">

    <!-- 🔥 TOP HEADER -->
    <div class="search-header">
        <i class="ri-arrow-left-line back-btn"></i>

        <input 
            type="text" 
            id="searchInput"
            placeholder="Search for Products, Brands and More"
        >
    </div>

    <!-- 🔥 HISTORY -->
    <ul class="history" id="historyList"></ul>

</div>

<script>
/* =========================
   BACK BUTTON (SAFE)
========================= */
document.addEventListener("DOMContentLoaded", function () {

    const backBtn = document.querySelector(".back-btn");

    if (backBtn) {
        backBtn.addEventListener("click", function () {
            window.history.back();
            console.log("back clicked");
        });
    }

});


/* =========================
   SEARCH HISTORY SYSTEM
========================= */

let history = JSON.parse(localStorage.getItem("searchHistory")) || [];
const input = document.getElementById("searchInput");


/* ENTER → SAVE */
if (input) {
    input.addEventListener("keydown", function (event) {

        if (event.key === "Enter") {

            let value = input.value.trim();
            if (!value) return;

            history = history.filter(item => item !== value);
            history.unshift(value);

            if (history.length > 10) {
                history.pop();
            }

            localStorage.setItem("searchHistory", JSON.stringify(history));

            renderHistory();

            input.value = "";
        }
    });
}


/* DELETE ITEM */
function deleteItem(index) {
    history.splice(index, 1);
    localStorage.setItem("searchHistory", JSON.stringify(history));
    renderHistory();
}


/* CLICK SEARCH */
function useSearch(value) {
    if (!input) return;
    input.value = value;
    input.focus();
}


/* RENDER */
function renderHistory() {

    const list = document.getElementById("historyList");
    if (!list) return;

    list.innerHTML = "";

    history.forEach((item, index) => {

        let li = document.createElement("li");

        li.innerHTML = `
            <span onclick="useSearch('${item}')">${item}</span>
            <button onclick="deleteItem(${index})">✖</button>
        `;

        list.appendChild(li);
    });
}


/* INIT */
window.addEventListener("load", renderHistory);
 </script>

</body>
</html>
