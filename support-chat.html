<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Talk With Us</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#f5f5f5;
    color:#111;

    display:flex;
    flex-direction:column;

    height:100vh;

    font-size:14px;
}

/* =========================
   NAVBAR
========================= */


.navbar{
    height:56px;
    background:#fff;

    display:flex;
    align-items:center;

    padding:0 16px;

    border-bottom:1px solid #eee;

    flex-shrink:0;
}

.navbar i{
    font-size:19px;
    cursor:pointer;
    color:#111;
}

.navbar h3{
    margin-left:14px;

    font-size:16px;
    font-weight:600;
}

/* =========================
   CHAT AREA
========================= */

.chat-area{
    flex:1;

    overflow-y:auto;

    padding:14px;
}

/* =========================
   MESSAGE
========================= */

.msg{
    max-width:75%;

    padding:12px 14px;

    border-radius:16px;

    margin-bottom:12px;

    font-size:14px;

    line-height:1.5;
}

.bot{
    background:#fff;

    border:1px solid #eee;
}

.user{
    background:#e9ecef;

    margin-left:auto;
}

/* =========================
   INPUT AREA
========================= */

.chat-input{
    background:#fff;

    border-top:1px solid #eee;

    padding:10px;

    display:flex;
    align-items:center;
    gap:10px;

    flex-shrink:0;
}

.chat-input input{
    flex:1;

    height:46px;

    border:none;

    background:#f1f3f6;

    border-radius:14px;

    padding:0 14px;

    font-size:14px;

    outline:none;
}

.chat-input button{
    width:48px;
    height:46px;

    border:none;

    border-radius:14px;

    background:#111;

    color:#fff;

    cursor:pointer;

    font-size:16px;
}

</style>
</head>

<body>

<div class="navbar">

    <i class="fa-solid fa-arrow-left"
    onclick="history.back()"></i>

    <h3>Talk With Us</h3>

</div>

<div class="chat-area">

    <div class="msg bot">
        Hello 👋<br>
        How can we help you today?
    </div>

</div>

<div class="chat-input">

    <input type="text"
    placeholder="Type your message...">

    <button>
        <i class="fa-solid fa-paper-plane"></i>
    </button>

</div>

<script>

function goBack(){

    if(history.length > 1){

        history.back();

    }else{

        window.location.href = "help.html";

    }

}

</script>
</body>
</html>
